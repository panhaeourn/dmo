spring.application.name=demo
server.port=${PORT:10000}

# =========================
# DATABASE
# =========================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# =========================
# FRONTEND
# =========================
app.frontend-url=${APP_FRONTEND_URL}

# =========================
# JWT
# =========================
app.jwt.secret-base64=${APP_JWT_SECRET_BASE64}
app.jwt.expiry-ms=${APP_JWT_EXPIRY_MS:86400000}

# =========================
# GOOGLE OAUTH
# =========================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# =========================
# CLOUDFLARE R2
# =========================
cloudflare.r2.endpoint=${CLOUDFLARE_R2_ENDPOINT}
cloudflare.r2.region=${CLOUDFLARE_R2_REGION:auto}
cloudflare.r2.access-key=${CLOUDFLARE_R2_ACCESS_KEY}
cloudflare.r2.secret-key=${CLOUDFLARE_R2_SECRET_KEY}
cloudflare.r2.bucket=${CLOUDFLARE_R2_BUCKET:course-videos}

# =========================
# FILE UPLOAD
# =========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=1500MB
spring.servlet.multipart.max-request-size=1500MB

logging.level.org.springframework.security.oauth2=INFO
logging.level.org.springframework.web.client=INFO
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never

# =========================
# BAKONG OPEN API
# =========================
bakong.token=${BAKONG_TOKEN}
bakong.base-url=${BAKONG_BASE_URL:https://api-bakong.nbc.gov.kh}
bakong.merchant.account-information=${BAKONG_MERCHANT_ACCOUNT_INFORMATION}
bakong.merchant.acquiring-bank=${BAKONG_MERCHANT_ACQUIRING_BANK}
bakong.merchant.name=${BAKONG_MERCHANT_NAME}
bakong.merchant.city=${BAKONG_MERCHANT_CITY:Phnom Penh}
bakong.currency=${BAKONG_CURRENCY:USD}
bakong.merchant.bakong-account-id=${BAKONG_MERCHANT_BAKONG_ACCOUNT_ID}
bakong.qr-expiry-seconds=${BAKONG_QR_EXPIRY_SECONDS:200}

app.admin-email=${APP_ADMIN_EMAIL}